    - type: Paper
      stampState: paper_stamp-centcom
      stampedBy:
      - hasIcon: True
        stampFont: null
        stampLargeIcon: large_stamp-centcom
        stampedColor: '#006600FF'
        stampedName: stamp-component-stamped-name-centcom
      content: >-
        Hello and welcome, engineering crew of NTQB "Dash" Investigator.


        Dash is our 1st high(ish) budget first-class research shuttle we're sending to the Point Blue nebula. As i'm sure it has become clear to you already, budget has nothing to do with how big we can build these shuttles and although we were able to provide you a thermo-electric generator as a more reliable and profitable power source, you'll have to build this one yourself.


        There are floodlights and a decent portion of steel rods outside near the burn chamber in space to assist with the expansion of the perimeter with the purpose of setting up your new engine. We've also made your department of somewhat cheaper materials so that more thorough reconfiguration can be at least a little less time consuming.


        Do keep in mind that the engineering department of Dash is like a big exposed engine at the back of the vessel, and while very shielded you might still wish to install meteor shielding of your own at the back.


        Good luck!

        - Centcomm Official Jilly Glorp
