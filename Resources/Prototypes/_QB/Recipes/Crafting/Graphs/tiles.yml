- type: constructionGraph
  id: TileWoodTileBlack
  start: start
  graph:
  - node: start
    edges:
    - to: woodtile
      completed:
      - !type:SetStackCount
        amount: 4
      steps:
      # Needs StackType ID
      - material: WoodPlank
        amount: 1
  - node: woodtile
    entity: FloorTileItemWoodTileBlack

