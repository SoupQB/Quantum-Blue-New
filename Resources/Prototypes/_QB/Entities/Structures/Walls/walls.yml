
# Both girders and walls go here
# Check comments for organization

# Walls

- type: entity
  id: QBStationRock
  parent: BaseStructure
  name: station rock
  suffix: No Ore
  description: A wall of tightly packed cobblestone, no doubt result of many asteroid impacts.
  components:
  - type: Sprite
    sprite: _QB/Structures/Walls/station_rock.rsi
    state: full
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Rock
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 240
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
  - type: Occluder
  - type: Airtight
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 100
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: IconSmooth
    key: rock
    base: rock_

- type: entity
  id: QBStationRockOre
  parent: QBStationRock
  name: station rock
  suffix: Low Ore Chance
  description: A wall of tightly packed cobblestone, no doubt result of many asteroid impacts. This one is glistening with ore.
  components:
  - type: Sprite
    sprite: _QB/Structures/Walls/station_rock.rsi
    state: orefull
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 240
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
  - type: OreVein
    oreChance: 0.33
    oreRarityPrototypeId: RandomOreDistributionStandard
  - type: IconSmooth
    key: rock
    base: ore_

