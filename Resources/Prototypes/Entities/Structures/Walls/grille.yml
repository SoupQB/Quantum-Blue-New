- type: entity
  id: ClockworkGrille
  parent: Grille
  name: ornate grille # Start of QB changes - Iconsmoothening
  description: An ornate framework of iron rods assembled in a fancy but still fairly reinforced pattern.
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _QB/Structures/Walls/clockwork_grille.rsi
    state: full
    layers:
      - state: full
  - type: PlacementReplacement
    key: grilles
  - type: Icon
    sprite: _QB/Structures/Walls/clockwork_grille.rsi
    state: full
  - type: IconSmooth
    key: clock_grille
    base: grille # End of QB changes - Iconsmoothening
  - type: Construction
    graph: ClockGrille
    node: clockGrille
    deconstructionTarget: start

- type: entity
  id: GrilleBroken
  parent: BaseStructure
  name: grille
  description: A flimsy framework of iron rods. It has seen better days.
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _QB/Structures/Walls/grille.rsi # QB
    state: grille_broken
  - type: Icon
    sprite: _QB/Structures/Walls/grille.rsi # QB
    state: grille_broken
  - type: RCDDeconstructable
    cost: 0 # QB
    delay: 2 # QB
    fx: EffectRCDDeconstruct4
  - type: Construction
    graph: Grille
    node: grilleBroken
    deconstructionTarget: start
  - type: Fixtures # overwrite BaseStructure parent.
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Tag
    tags:
    - ForceNoFixRotations
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: FlimsyMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: ClockworkGrilleBroken
  parent: GrilleBroken
  name: ornate grille # QB
  description: A ornate framework of iron rods assembled in a fancy but still fairly reinforced pattern. It has seen better days. # QB
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _QB/Structures/Walls/clockwork_grille.rsi # QB
    state: brokengrille # QB
  - type: Icon
    sprite: _QB/Structures/Walls/clockwork_grille.rsi # QB
    state: brokengrille # QB
  - type: Construction
    graph: ClockGrille
    node: clockGrilleBroken

- type: entity
  id: GrilleDiagonal
  parent: Grille
  name: diagonal grille
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _QB/Structures/Walls/grille.rsi # QB
    layers:
    - state: diagonal0 # QB
    - state: electrified_diagonal
      sprite: Effects/electricity.rsi
      map: ["enum.ElectrifiedLayers.Sparks"]
      shader: unshaded
      visible: false
  - type: Icon
    sprite: _QB/Structures/Walls/grille.rsi # QB
    state: diagonal0 # QB
  - type: Tag
    tags:
    - Diagonal
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.5,0.5"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Construction
    graph: GrilleDiagonal
    node: grilleDiagonal
  - type: IconSmooth # IconSmooth added by QB
    mode: Diagonal
    key: grille
    base: diagonal # QB changes end

