- type: entity
  parent: ReinforcedWindow
  id: XenoResinWindow
  name: xeno resin window # QB
  description: Transparent and hardened yet slightly sticky to the touch, around a sturdy chitin frame. Slightly stronger than a normal reinforced window. # QB
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _QB/Structures/Windows/xeno_resin.rsi # QB
  - type: Icon
    sprite: _QB/Structures/Windows/xeno_resin.rsi # QB
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200 #excess damage (nuke?). avoid computational cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassReinforced:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: xeno # QB
    base: xwindow
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    damageDivisor: 4
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks.rsi
