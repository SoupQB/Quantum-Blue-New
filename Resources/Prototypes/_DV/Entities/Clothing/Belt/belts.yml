- type: entity
  parent: [ ClothingBeltBase, ClothingSlotBase ] # imp - contraband moment
  id: ClothingBeltFoamSheath
  name: foam sheath
  description: A foam sheath to cosplay as the captain! It seems to be able to fit a real sabre in it.
  components:
  - type: Sprite
    sprite: _DV/Clothing/Belt/foamsheath.rsi
    state: sheath
  - type: Clothing
    sprite: _DV/Clothing/Belt/foamsheath.rsi
  # imp below - from unparenting
  - type: Item
    size: Ginormous
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - CaptainSabre
  - type: ItemMapper
    mapLayers:
      sheath-sabre:
        whitelist:
          tags:
          - CaptainSabre
  - type: Appearance

- type: entity
  parent: ClothingBeltStorageBase
  id: ClothingBeltPaperwork
  name: paperwork belt
  description: For all your tactical paperwork needs on the field.
  components:
  - type: Sprite
    sprite: _DV/Clothing/Belt/paperwork.rsi
  - type: Clothing
    sprite: _DV/Clothing/Belt/paperwork.rsi
  - type: Storage
    whitelist:
      tags:
      - Folder
      - Document
      - Flashlight
      - Radio
      - Write # imp
      components:
      - FitsInDispenser
      - Stamp
      - HandLabeler # imp


- type: entity
  parent: ClothingBeltBase # DeltaV - reparent from ClothingBeltStorageBase
  id: ClothingBeltKatanaSheath
  name: katana sheaths
  description: An ornate belt designed to hold a pair of samurai's blades, or daisho.
  components:
  - type: Sprite
    sprite: _DV/Clothing/Belt/katanasheath.rsi
    state: sheath
  - type: Clothing
    sprite: _DV/Clothing/Belt/katanasheath.rsi
  - type: ItemSlots # DeltaV - adjust how objects are stored
    slots:
      katanaslot:
        name: clothing-belt-katana
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - Katana
        priority: 2
      wakizashislot:
        name: clothing-belt-wakizashi
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - Wakizashi
        priority: 1
  - type: ItemMapper # DeltaV - adjust how stored objects are displayed
    mapLayers:
      katana:
        whitelist:
          tags:
          - Katana
      wakizashi:
        whitelist:
          tags:
          - Wakizashi
    sprite: _DV/Clothing/Belt/katanasheath.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      katanaslot: !type:ContainerSlot {}
      wakizashislot: !type:ContainerSlot {}
  - type: Appearance
